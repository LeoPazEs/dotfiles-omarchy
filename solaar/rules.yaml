%YAML 1.3
---
- Rule:
    - And:
        - KeyIsDown: Middle Button
        - Test: [thumb_wheel_down, 6]
    - KeyPress:
        - [Control_L, minus]
        - click
- Rule:
    - And:
        - KeyIsDown: Middle Button
        - Test: [thumb_wheel_up, 6]
    - KeyPress:
        - [Control_L, equal]
        - click
...
---
- Rule:
    - Test: [thumb_wheel_down, 6]
    - KeyPress:
        - [Super_R, h]
        - click
- Rule:
    - Test: [thumb_wheel_up, 6]
    - KeyPress:
        - [Super_R, l]
        - click
...
---
- Rule:
    - MouseGesture: Mouse Up
    - KeyPress:
        - [Super_R, s]
        - click
- Rule:
    - MouseGesture: Mouse Down
    - KeyPress:
        - [Super_R, Control_L, Tab]
        - click
- Rule:
    - MouseGesture: Mouse Right
    - KeyPress:
        - [Super_R, Tab]
        - click
- Rule:
    - MouseGesture: Mouse Left
    - KeyPress:
        - [Super_R, Shift_R, Tab]
        - click
...
